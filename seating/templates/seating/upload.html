<!DOCTYPE html>
<html>
<head>
  <title>Upload Examinees - Smart Exam Seating</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f5f6ec;">

<nav class="navbar navbar-light bg-light px-4">
  <span class="navbar-brand mb-0 h5">Smart Exam Seating</span>
  <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-danger">Logout</button>
  </form>
</nav>

<div class="container mt-4">

  <h2 class="mb-4">Upload Examinee Excel</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4 shadow-sm rounded-4 text-center">

        <h5 class="mb-3">Upload Excel File</h5>
        <p class="text-muted mb-4">
          Upload the student Excel sheet (.xlsx / .xls) to generate seating.
        </p>

        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-4">
            <input type="file" name="excel"
                   class="form-control rounded-pill"
                   accept=".xlsx,.xls" required>
          </div>

          <button type="submit"
                  class="btn btn-success w-100 rounded-pill">
            ⬆ Upload & Next → Generate Seating
          </button>
        </form>

      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
