{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Exam Seating</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-container {
            display: flex;
            height: 100vh;
        }
        .login-left {
            flex: 1.5;
            background: url("{% static 'seating/images/exam-seating.jpeg' %}") no-repeat center center;
            background-size: cover;
        }
        .login-right {
            flex: 1;
            background: #e6e6e6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 80%;
            max-width: 350px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .form-control {
            border-radius: 12px;
            padding: 10px;
        }
        .btn-login {
            width: 100%;
            border-radius: 25px;
            background: #0b3c44;
            color: white;
            padding: 10px;
            border: none;
        }
        .btn-login:hover {
            background: #145e68;
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Left Image Section -->
    <div class="login-left"></div>

    <!-- Right Login Form -->
    <div class="login-right">
        <div class="login-box">
            <h2>LOG IN</h2>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-login">Sign In</button>
            </form>

            {% if form.errors %}
                <p class="text-danger mt-3 text-center">Invalid username or password</p>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
