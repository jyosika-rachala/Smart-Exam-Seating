<!DOCTYPE html>
<html>
<head>
  <title>Exam Slot - Smart Exam Seating</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f5f6ec;">

<nav class="navbar navbar-light bg-light px-4">
  <span class="navbar-brand mb-0 h5">Smart Exam Seating</span>
  <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-danger">Logout</button>
  </form>
</nav>

<div class="container mt-4">

  <h2 class="mb-4">Exam Slot</h2>

  <div class="row">
    <!-- Add Exam Slot -->
    <div class="col-md-5">
      <div class="card p-4 shadow-sm rounded-4 mb-4">
        <h5 class="mb-3">Add Exam Slot</h5>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <input type="text" name="name"
                   class="form-control rounded-pill"
                   placeholder="Slot Name (e.g. Mid-1)" required>
          </div>

          <div class="mb-3">
            <input type="date" name="date"
                   class="form-control rounded-pill" required>
          </div>

          <div class="mb-3">
            <input type="text" name="time_range"
                   class="form-control rounded-pill"
                   placeholder="10:00 AM - 12:00 PM" required>
          </div>

          <button type="submit" name="add"
                  class="btn btn-success w-100 rounded-pill">
            ➕ Add Slot
          </button>
        </form>
      </div>
    </div>

    <!-- Select / Existing Slots -->
    <div class="col-md-7">
      <div class="card p-4 shadow-sm rounded-4">
        <h5 class="mb-3">Select Exam Slot</h5>

        <form method="post">
          {% csrf_token %}

          {% for s in slots %}
            <div class="d-flex align-items-center justify-content-between mb-2">
              <div>
                <input type="radio" name="slot" value="{{ s.id }}"
                       class="form-check-input me-2" required>
                <strong>{{ s.name }}</strong>
                <span class="text-muted">
                  — {{ s.date }} ({{ s.time_range }})
                </span>
              </div>
              <button type="submit" name="delete" value="{{ s.id }}"
                      class="btn btn-sm btn-outline-danger rounded-pill">
                Delete
              </button>
            </div>
          {% empty %}
            <p class="text-muted">No exam slots added yet.</p>
          {% endfor %}

          <hr>

          <button type="submit" name="next"
                  class="btn btn-primary w-100 rounded-pill mt-3">
            Next → Upload Excel
          </button>
        </form>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
